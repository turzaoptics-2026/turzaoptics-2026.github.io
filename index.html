<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turza Optics | Crystal Clear Premium Eyewear</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f9f9fb; color: #1e2022; line-height: 1.6; }
        header { background: #fff; border-bottom: 1px solid #eaeaea; padding: 20px; text-align: center; }
        h1 { color: #111; font-size: 24px; letter-spacing: 1px; }
        .hero { max-width: 800px; margin: 60px auto; padding: 40px 20px; text-align: center; }
        .tagline { font-size: 14px; text-transform: uppercase; color: #777; letter-spacing: 2px; margin-bottom: 10px; }
        .main-title { font-size: 42px; color: #111; line-height: 1.2; margin-bottom: 20px; font-weight: 700; }
        .description { font-size: 18px; color: #555; max-width: 600px; margin: 0 auto 30px; }
        .cta-btn { display: inline-block; background: #111; color: #fff; text-decoration: none; padding: 15px 35px; border-radius: 4px; font-weight: 600; font-size: 16px; transition: background 0.2s; }
        .cta-btn:hover { background: #333; }
        footer { margin-top: 100px; padding: 20px; text-align: center; font-size: 13px; color: #aaa; border-top: 1px solid #eaeaea; }
    </style>
</head>
<body>

    <header>
        <h1>TURZA OPTICS</h1>
    </header>

    <main class="hero">
        <p class="tagline">Crystal Clear Premium Experience</p>
        <h1 class="main-title">See the world in high definition.</h1>
        <p class="description">Discover a premium eyewear experience tailored for flawless precision and style. Upgrade your look and vision today.</p>
        <a href="#" class="cta-btn">Shop the Collection</a>
    </main>

    <footer>
        &copy; 2026 Turza Optics. All Rights Reserved.
    </footer>

</body>
</html>
